kind = "web"
previewPath = "/"
title = "sup'work"
version = "1.0.0"
id = "artifacts/supwork"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20118

[services.development]
run = "pnpm --filter @workspace/supwork run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/supwork", "run", "build" ]
publicDir = "artifacts/supwork/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20118"
BASE_PATH = "/"
